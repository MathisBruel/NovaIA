services:
  db:
    image: mysql:8.4
    container_name: specialweek-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: specialweek
      MYSQL_USER: specialweek
      MYSQL_PASSWORD: specialweek
    ports:
      - "3306:3306"
    volumes:
      - ./migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "specialweek", "-pspecialweek"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: specialweek-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: specialweek-frontend
    environment:
      - VITE_API_BASE_URL=
      - VITE_API_PROXY_TARGET=http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - db
